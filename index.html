<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Modrinth Market Analytics</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #c9d1d9; --text-muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --orange: #d29922; --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

  nav {
    border-bottom: 1px solid var(--border); background: rgba(13,17,23,0.95);
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
  }
  nav .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 20px;
    display: flex; align-items: center; height: 52px;
  }
  nav .logo { font-size: 16px; font-weight: 700; margin-right: 32px; letter-spacing: -0.3px; }
  nav .logo span { color: var(--accent); }
  nav .nav-links { display: flex; gap: 4px; }
  nav .nav-link {
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    color: var(--text-muted); font-size: 13px; font-weight: 500;
    border: none; background: none; transition: all 0.15s;
  }
  nav .nav-link:hover { color: var(--text); background: var(--card); }
  nav .nav-link.active { color: #fff; background: var(--accent); }
  nav .nav-stats { margin-left: auto; display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }

  .page { display: none; padding: 32px 0; }
  .page.active { display: block; }
  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .page-header .subtitle { color: var(--text-muted); font-size: 14px; }

  .section { margin-bottom: 40px; }
  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .section-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

  .summary-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .summary-stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .summary-stat .ss-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .summary-stat .ss-value { font-size: 20px; font-weight: 700; }

  .pt-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .pt-tab {
    padding: 7px 16px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; border: 1px solid var(--border);
    background: var(--card); color: var(--text-muted);
    transition: all 0.15s; text-transform: capitalize;
  }
  .pt-tab:hover { color: var(--text); border-color: var(--text-muted); }
  .pt-tab.active { color: #fff; background: var(--accent); border-color: var(--accent); }
  .pt-tab .pt-count { font-size: 10px; opacity: 0.7; margin-left: 4px; }
  .pt-tab .pt-status { font-size: 9px; margin-left: 6px; }
  .pt-tab .pt-status.loading { color: var(--orange); }
  .pt-tab .pt-status.ready { color: var(--green); }
  .pt-tab .pt-status.error { color: var(--red); }
  .pt-content { display: none; }
  .pt-content.active { display: block; }

  .pt-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .pt-stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
  }
  .pt-stat .pt-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
  .pt-stat .pt-value { font-size: 18px; font-weight: 700; margin-top: 2px; }

  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--card); border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
  }
  th {
    background: #1c2128; color: var(--text-muted); font-weight: 500;
    text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(88,166,255,0.03); }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }

  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
  }
  .tag.blue { background: rgba(88,166,255,0.15); color: var(--accent); }
  .tag.green { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag.orange { background: rgba(210,153,34,0.15); color: var(--orange); }
  .tag.purple { background: rgba(188,140,255,0.15); color: var(--purple); }

  .empty { text-align: center; padding: 24px; color: var(--text-muted); font-size: 13px; }

  .countdown-card {
    background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px; padding: 8px 16px; text-align: center;
  }
  .countdown-card .cd-label { font-size: 10px; color: var(--orange); text-transform: uppercase; letter-spacing: 0.5px; }
  .countdown-card .cd-value { font-size: 22px; font-weight: 700; color: var(--orange); font-family: 'SF Mono', 'Consolas', monospace; }

  /* Streaming / loading states */
  .streaming-banner {
    display: flex; align-items: center; gap: 8px;
    background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.3);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 16px;
    font-size: 12px; color: var(--accent);
  }
  .streaming-banner.done {
    background: rgba(63,185,80,0.08); border-color: rgba(63,185,80,0.3); color: var(--green);
  }
  .streaming-banner .spinner {
    width: 12px; height: 12px; border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .streaming-banner.done .spinner { display: none; }

  .placeholder-shimmer {
    background: linear-gradient(90deg, var(--card) 25%, rgba(48,54,61,0.5) 50%, var(--card) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
    border-radius: 8px; min-height: 60px; margin-bottom: 8px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .progress-bar {
    width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-bar .progress-fill {
    height: 100%; background: var(--accent); width: 0%;
    transition: width 0.3s ease;
  }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="logo">Modrinth <span>Analytics</span></div>
    <div class="nav-links">
      <button class="nav-link active" onclick="switchPage('home', event)">Home</button>
      <button class="nav-link" onclick="switchPage('history', event)">History of Runs</button>
    </div>
    <div class="nav-stats" id="navStats"></div>
  </div>
</nav>

<div class="container">
  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div class="page-header">
      <h1>Market Overview</h1>
      <div class="subtitle">Simple rankings — what's growing fastest across Modrinth</div>
    </div>

    <div id="streamingBanner"></div>
    <div class="progress-bar" id="progressBar" style="display:none;"><div class="progress-fill" id="progressFill"></div></div>

    <div class="summary-stats" id="summaryStats"></div>

    <div class="summary-stats" id="countdownRow" style="grid-template-columns: repeat(4, 1fr);"></div>

    <!-- Project Type Tabs -->
    <div class="section">
      <div class="section-title">Market Breakdown</div>
      <div class="section-subtitle">General = full overview. Click a type for its own rankings. Tabs load in parallel as data streams in.</div>
      <div class="pt-tabs" id="ptTabs"></div>
      <div id="ptContents"></div>
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div class="page-header">
      <h1>History of Runs</h1>
      <div class="subtitle">All data collection runs</div>
    </div>
    <div id="runHistory"></div>
  </div>
</div>

<script>
const PROJECT_TYPES = ["mod","modpack","resourcepack","shader","datapack","plugin"];
const PT_LABELS = {mod:"Mods",modpack:"Modpacks",resourcepack:"Resource Packs",shader:"Shaders",datapack:"Data Packs",plugin:"Plugins"};
const CACHE_BUST = () => '?' + Date.now();

// Streaming state
let SUMMARY = null;           // small summary data (totals + per-type summary)
let COMBINED = null;          // combined rankings (top projects, VL, categories)
let TYPE_DATA = {};           // per-type detailed data: { mod: {...}, modpack: {...}, ... }
let TYPE_LOAD_STATE = {};    // per-type load state: 'pending' | 'loading' | 'ready' | 'error'
let HISTORY_DATA = null;     // run history (loaded on demand)
let ACTIVE_PT = 'general';   // active project type tab

// ── Formatters ──────────────────────────────────────────────────
function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}
function fmtDelta(n) { return (n>=0?'+':'')+fmt(Math.abs(n)).replace(/\.0$/,''); }
function fmtPct(n) { return (n>=0?'+':'')+n.toFixed(2)+'%'; }
function escHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function loaderTag(loader) {
  const colors = {fabric:'green',forge:'orange',neoforge:'purple',quilt:'blue',iris:'blue',minecraft:'blue',optifine:'orange',paper:'blue',spigot:'orange',bukkit:'green',folia:'purple'};
  const cls = colors[loader?.toLowerCase()] || 'blue';
  return `<span class="tag ${cls}">${escHtml(loader||'—')}</span>`;
}

// ── Streaming loader ──────────────────────────────────────────────
// Phase 1: fetch summary (small, instant render of totals + tab header)
// Phase 2: fetch combined + all per-type files in parallel; render as each arrives

async function loadStreaming() {
  setStreamingBanner('loading', 'Fetching summary…');
  setProgress(5);

  // Phase 1: summary
  try {
    const res = await fetch('reports/summary.json' + CACHE_BUST());
    if (!res.ok) throw new Error(`summary.json ${res.status}`);
    SUMMARY = await res.json();
    setProgress(15);
    renderSummary();
    renderCountdown();
    renderProjectTypeTabs();
    setStreamingBanner('loading', `Summary ready. Streaming ${PROJECT_TYPES.length} project types + combined rankings…`);
  } catch (e) {
    console.error('Summary load failed:', e);
    setStreamingBanner('error', `Failed to load summary: ${e.message}`);
    return;
  }

  // Phase 2: kick off parallel fetches for combined + each per-type file
  const fetches = [
    fetch('reports/combined.json' + CACHE_BUST()).then(r => r.ok ? r.json() : Promise.reject(new Error(`combined.json ${r.status}`))),
    ...PROJECT_TYPES.map(pt =>
      fetch(`reports/type/${pt}.json` + CACHE_BUST())
        .then(r => r.ok ? r.json() : Promise.reject(new Error(`type/${pt}.json ${r.status}`)))
        .then(data => ({ pt, data }))
    )
  ];

  let completed = 0;
  const total = fetches.length;
  const bump = () => {
    completed++;
    setProgress(15 + Math.floor((completed / total) * 85));
  };

  // Render each per-type as it arrives (updates tab status + renders if active)
  await Promise.allSettled(fetches.map(async (p, idx) => {
    try {
      const result = await p;
      bump();
      if (idx === 0) {
        // Combined rankings
        COMBINED = result;
        TYPE_LOAD_STATE['general'] = 'ready';
        updateTabStatus('general', 'ready');
        if (ACTIVE_PT === 'general') renderActiveTab();
      } else {
        const { pt, data } = result;
        TYPE_DATA[pt] = data;
        TYPE_LOAD_STATE[pt] = 'ready';
        updateTabStatus(pt, 'ready');
        if (ACTIVE_PT === pt) renderActiveTab();
      }
    } catch (e) {
      bump();
      const pt = idx === 0 ? 'general' : PROJECT_TYPES[idx - 1];
      TYPE_LOAD_STATE[pt] = 'error';
      updateTabStatus(pt, 'error');
      console.error(`Failed to load ${pt}:`, e.message);
    }
  }));

  setStreamingBanner('done', `All data loaded — ${completed}/${total} chunks received`);
  setTimeout(() => setStreamingBanner('hidden', ''), 4000);
}

function setStreamingBanner(state, msg) {
  const el = document.getElementById('streamingBanner');
  if (state === 'hidden') { el.innerHTML = ''; return; }
  const cls = state === 'done' ? 'done' : (state === 'error' ? 'done' : '');
  el.innerHTML = `<div class="streaming-banner ${cls}"><div class="spinner"></div><span>${escHtml(msg)}</span></div>`;
}

function setProgress(pct) {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  if (pct >= 100) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  fill.style.width = pct + '%';
}

function updateTabStatus(pt, state) {
  const tab = document.querySelector(`.pt-tab[data-pt="${pt}"]`);
  if (!tab) return;
  const statusEl = tab.querySelector('.pt-status');
  if (!statusEl) return;
  const label = state === 'loading' ? '⏳' : state === 'ready' ? '✓' : state === 'error' ? '✗' : '';
  const cls = state === 'loading' ? 'loading' : state === 'ready' ? 'ready' : state === 'error' ? 'error' : '';
  statusEl.className = `pt-status ${cls}`;
  statusEl.textContent = label;
}

// ── Page navigation ──────────────────────────────────────────────
function switchPage(page, event) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  if (page === 'history') renderHistory();
}

// ── Render functions ─────────────────────────────────────────────
function renderSummary() {
  if (!SUMMARY) return;
  const t = SUMMARY.totals || {};
  document.getElementById('navStats').innerHTML = `Projects: ${fmt(t.projects||0)} · Downloads: ${fmt(t.downloads||0)}`;
  const ts = SUMMARY.generated_at || '';
  document.getElementById('summaryStats').innerHTML = `
    <div class="summary-stat"><div class="ss-label">Total Projects</div><div class="ss-value">${fmt(t.projects||0)}</div></div>
    <div class="summary-stat"><div class="ss-label">Total Downloads</div><div class="ss-value">${fmt(t.downloads||0)}</div></div>
    <div class="summary-stat"><div class="ss-label">Total Versions</div><div class="ss-value">${fmt(t.versions||0)}</div></div>
    <div class="summary-stat"><div class="ss-label">Updated</div><div class="ss-value" style="font-size:14px">${ts.slice(0,16).replace('T',' ')}</div></div>
  `;
}

function renderCountdown() {
  const now = new Date();
  const nextUTC = new Date(Math.ceil(now.getTime() / (2*3600*1000)) * (2*3600*1000));
  const diff = nextUTC - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const beijingTime = new Date(now.getTime() + 8*3600*1000).toISOString().slice(0,16).replace('T',' ');
  const utcTime = now.toISOString().slice(0,16).replace('T',' ');
  const cd = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('countdownRow').innerHTML = `
    <div class="summary-stat"><div class="ss-label">UTC Time</div><div class="ss-value" style="font-size:14px;font-family:'SF Mono',monospace">${utcTime}</div></div>
    <div class="summary-stat"><div class="ss-label">Beijing Time</div><div class="ss-value" style="font-size:14px;font-family:'SF Mono',monospace">${beijingTime}</div></div>
    <div class="countdown-card"><div class="cd-label">Next Run</div><div class="cd-value">${cd}</div></div>
    <div class="summary-stat"><div class="ss-label">Workflow</div><div class="ss-value" style="font-size:14px">—</div></div>
  `;
}

function renderProjectTypeTabs() {
  const pts = SUMMARY.project_types || {};
  const totals = SUMMARY.totals || {};
  const generalTab = `<div class="pt-tab active" data-pt="general" onclick="selectPt('general')">General<span class="pt-count">(${fmt(totals.projects||0)})</span><span class="pt-status loading">⏳</span></div>`;
  const typeTabs = PROJECT_TYPES.map(pt => {
    const info = pts[pt] || {};
    const count = info.total_projects || 0;
    const exists = pts[pt] && typeof pts[pt] === 'object';
    const statusCls = exists ? 'loading' : 'error';
    const statusIcon = exists ? '⏳' : '✗';
    return `<div class="pt-tab" data-pt="${pt}" onclick="selectPt('${pt}')">${PT_LABELS[pt]}<span class="pt-count">(${fmt(count)})</span><span class="pt-status ${statusCls}">${statusIcon}</span></div>`;
  }).join('');
  document.getElementById('ptTabs').innerHTML = generalTab + typeTabs;

  // Pre-create content containers with loading placeholders
  const generalContent = `<div class="pt-content active" data-pt="general">${renderPlaceholder()}</div>`;
  const typeContents = PROJECT_TYPES.map(pt =>
    `<div class="pt-content" data-pt="${pt}">${renderPlaceholder()}</div>`
  ).join('');
  document.getElementById('ptContents').innerHTML = generalContent + typeContents;
}

function renderPlaceholder() {
  return `
    <div class="placeholder-shimmer" style="height:60px"></div>
    <div class="placeholder-shimmer" style="height:300px"></div>
  `;
}

function selectPt(pt) {
  ACTIVE_PT = pt;
  document.querySelectorAll('.pt-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.pt-tab[data-pt="${pt}"]`)?.classList.add('active');
  document.querySelectorAll('.pt-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.pt-content[data-pt="${pt}"]`)?.classList.add('active');
  renderActiveTab();
}

function renderActiveTab() {
  const pt = ACTIVE_PT;
  const container = document.querySelector(`.pt-content[data-pt="${pt}"]`);
  if (!container) return;

  if (pt === 'general') {
    if (!COMBINED) { container.innerHTML = renderPlaceholder(); return; }
    container.innerHTML = `
      ${renderGeneralTopProjects()}
      ${renderGeneralCategories()}
      ${renderGeneralVLPairs()}
    `;
    return;
  }

  const info = TYPE_DATA[pt];
  if (!info) {
    const state = TYPE_LOAD_STATE[pt];
    if (state === 'error') {
      container.innerHTML = `<div class="empty">Failed to load ${PT_LABELS[pt]} data. Will retry on next refresh.</div>`;
    } else {
      container.innerHTML = renderPlaceholder();
    }
    return;
  }
  container.innerHTML = `
    ${renderPerTypeSummary(info)}
    ${renderPerTypeTopProjects(info)}
    ${renderPerTypeCategories(info)}
    ${renderPerTypeVLPairs(info)}
  `;
}

// ── General Tab ──────────────────────────────────────────────────
function renderGeneralTopProjects() {
  const all = (COMBINED || {}).top_projects || [];
  return `
    <div class="section-title">Top Growing Projects — What to Build Next</div>
    <div class="section-subtitle">Ranked by download increase across all project types</div>
    ${all.length ? `
    <table>
      <thead><tr><th>#</th><th>Project</th><th>Type</th><th class="num">Increase</th><th class="num">Total</th></tr></thead>
      <tbody>
        ${all.map((p,i) => `<tr>
          <td>${i+1}</td>
          <td><strong>${escHtml(p.title||'')}</strong></td>
          <td><span class="tag blue">${p.project_type||'mod'}</span></td>
          <td class="num positive">${fmtDelta(p.delta_downloads)}</td>
          <td class="num">${fmt(p.current_downloads)}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No data yet</div>'}`;
}

function renderGeneralCategories() {
  const cats = (COMBINED || {}).category_rankings || [];
  return `
    <div class="section-title" style="margin-top:32px;">Categories with Most Increase — Where to Focus</div>
    <div class="section-subtitle">Categories ranked by total download growth across all types</div>
    ${cats.length ? `
    <table>
      <thead><tr><th>#</th><th>Category</th><th class="num">Projects</th><th class="num">Total</th><th class="num">New</th><th>Types</th></tr></thead>
      <tbody>
        ${cats.map((c,i) => `<tr>
          <td>${i+1}</td><td><strong>${escHtml(c.category)}</strong></td>
          <td class="num">${fmt(c.projects)}</td>
          <td class="num">${fmt(c.total_downloads)}</td>
          <td class="num positive">${fmtDelta(c.new_downloads)}</td>
          <td>${Object.keys(c.types||{}).map(t=>`<span class="tag blue" style="margin-right:2px">${t}</span>`).join('')}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No data yet</div>'}`;
}

function renderGeneralVLPairs() {
  const topVL = (COMBINED||{}).top_version_loaders || [];
  return `
    <div class="section-title" style="margin-top:32px;">All Version+Loader Combinations Ranked</div>
    <div class="section-subtitle">Highest download growth by version-loader pair across all types</div>
    ${topVL.length ? `
    <table>
      <thead><tr><th>#</th><th>Game Version</th><th>Loader</th><th class="num">Delta</th><th class="num">Projects</th><th>Top Project</th></tr></thead>
      <tbody>
        ${topVL.map((vl,i) => `<tr>
          <td>${i+1}</td>
          <td><span class="mono" style="font-weight:600">${escHtml(vl.game_version||'—')}</span></td>
          <td>${loaderTag(vl.loader||'')}</td>
          <td class="num positive" style="font-weight:600">${fmtDelta(vl.delta_downloads)}</td>
          <td class="num">${fmt(vl.project_count||0)}</td>
          <td>${escHtml(vl.top_project_title||'—')}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No data yet</div>'}`;
}

// ── Per-Type ─────────────────────────────────────────────────────
function renderPerTypeSummary(info) {
  const s = info.summary || {};
  return `
    <div class="pt-summary">
      <div class="pt-stat"><div class="pt-label">Projects</div><div class="pt-value">${fmt(s.total_projects||0)}</div></div>
      <div class="pt-stat"><div class="pt-label">Versions</div><div class="pt-value">${fmt(s.total_versions||0)}</div></div>
      <div class="pt-stat"><div class="pt-label">Downloads</div><div class="pt-value">${fmt(s.total_downloads||0)}</div></div>
      <div class="pt-stat"><div class="pt-label">New Downloads</div><div class="pt-value positive">${fmtDelta(s.new_downloads_since_baseline||0)}</div></div>
    </div>`;
}

function renderPerTypeTopProjects(info) {
  const all = info.all_project_deltas || info.top_projects || [];
  return `
    <div class="section-title" style="font-size:14px;margin-bottom:10px;">Projects by Increase</div>
    ${all.length ? `
    <table>
      <thead><tr><th>#</th><th>Project</th><th class="num">Increase</th><th class="num">Total</th></tr></thead>
      <tbody>
        ${all.map((p,i) => `<tr>
          <td>${i+1}</td>
          <td><strong>${escHtml(p.title||'')}</strong></td>
          <td class="num positive">${fmtDelta(p.delta_downloads)}</td>
          <td class="num">${fmt(p.current_downloads)}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div class="empty">No data yet</div>'}`;
}

function renderPerTypeCategories(info) {
  const cats = info.category_rankings || [];
  if (!cats.length) return '';
  return `
    <div class="section-title" style="font-size:14px;margin-top:20px;margin-bottom:10px;">Categories by Increase</div>
    <table>
      <thead><tr><th>#</th><th>Category</th><th class="num">Projects</th><th class="num">New</th><th class="num">Growth</th></tr></thead>
      <tbody>
        ${cats.map((c,i) => `<tr>
          <td>${i+1}</td><td><strong>${escHtml(c.category)}</strong></td>
          <td class="num">${fmt(c.projects)}</td>
          <td class="num positive">${fmtDelta(c.new_downloads)}</td>
          <td class="num">${fmtPct(c.growth_pct||0)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderPerTypeVLPairs(info) {
  const vls = info.top_version_loaders || [];
  if (!vls.length) return '';
  return `
    <div class="section-title" style="font-size:14px;margin-top:20px;margin-bottom:10px;">Version+Loader by Increase</div>
    <table>
      <thead><tr><th>#</th><th>Game Version</th><th>Loader</th><th class="num">Delta</th><th class="num">Projects</th><th>Top Project</th></tr></thead>
      <tbody>
        ${vls.map((vl,i) => `<tr>
          <td>${i+1}</td>
          <td><span class="mono" style="font-weight:600">${escHtml(vl.game_version||'—')}</span></td>
          <td>${loaderTag(vl.loader||'')}</td>
          <td class="num positive" style="font-weight:600">${fmtDelta(vl.delta_downloads)}</td>
          <td class="num">${fmt(vl.project_count||0)}</td>
          <td>${escHtml(vl.top_project_title||'—')}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── History Page (lazy-loaded) ──────────────────────────────────
async function renderHistory() {
  const container = document.getElementById('runHistory');
  if (HISTORY_DATA) {
    renderHistoryTable(HISTORY_DATA);
    return;
  }
  container.innerHTML = '<div class="empty">Loading run history…</div>';
  try {
    const res = await fetch('reports/run_history.json' + CACHE_BUST());
    if (!res.ok) throw new Error(`run_history.json ${res.status}`);
    HISTORY_DATA = await res.json();
    renderHistoryTable(HISTORY_DATA);
  } catch (e) {
    container.innerHTML = `<div class="empty">Failed to load run history: ${escHtml(e.message)}</div>`;
  }
}

function renderHistoryTable(runs) {
  document.getElementById('runHistory').innerHTML = runs.length ? `
    <table>
      <thead><tr><th>Start</th><th>End</th><th>Duration</th><th>Type</th><th class="num">Projects</th><th class="num">Downloads</th><th class="num">New</th><th>Types</th></tr></thead>
      <tbody>
        ${runs.map(r => {
          const dur = r.duration_seconds > 60 ? Math.floor(r.duration_seconds/60)+'m' : r.duration_seconds+'s';
          return `<tr>
            <td class="mono">${escHtml(r.start_time)}</td>
            <td class="mono">${escHtml(r.end_time)}</td>
            <td>${dur}</td>
            <td>${r.analysis_type}</td>
            <td class="num">${fmt(r.totals.projects)}</td>
            <td class="num">${fmt(r.totals.downloads)}</td>
            <td class="num positive">${fmtDelta(r.totals.new_downloads)}</td>
            <td>${r.totals.type_count}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  ` : '<div class="empty">No runs recorded yet</div>';
}

// ── Init ─────────────────────────────────────────────────────────
loadStreaming();
setInterval(renderCountdown, 1000);
setInterval(() => {
  // Re-fetch summary every 2 min (lightweight). Full re-stream only if totals changed.
  fetch('reports/summary.json' + CACHE_BUST())
    .then(r => r.ok ? r.json() : null)
    .then(s => {
      if (!s) return;
      if (!SUMMARY || s.generated_at !== SUMMARY.generated_at) {
        SUMMARY = s;
        renderSummary();
        renderProjectTypeTabs();
        // Re-stream the per-type + combined data
        TYPE_DATA = {}; COMBINED = null; TYPE_LOAD_STATE = {};
        loadStreamingPostSummary();
      }
    })
    .catch(() => {});
}, 120000);

async function loadStreamingPostSummary() {
  // Re-fetch combined + per-type in parallel
  const fetches = [
    fetch('reports/combined.json' + CACHE_BUST()).then(r => r.ok ? r.json() : null),
    ...PROJECT_TYPES.map(pt =>
      fetch(`reports/type/${pt}.json` + CACHE_BUST())
        .then(r => r.ok ? r.json() : null)
        .then(data => ({ pt, data }))
    )
  ];
  const results = await Promise.allSettled(fetches);
  if (results[0].status === 'fulfilled' && results[0].value) {
    COMBINED = results[0].value;
    TYPE_LOAD_STATE['general'] = 'ready';
    updateTabStatus('general', 'ready');
    if (ACTIVE_PT === 'general') renderActiveTab();
  }
  for (let i = 1; i < results.length; i++) {
    if (results[i].status === 'fulfilled' && results[i].value && results[i].value.data) {
      const { pt, data } = results[i].value;
      TYPE_DATA[pt] = data;
      TYPE_LOAD_STATE[pt] = 'ready';
      updateTabStatus(pt, 'ready');
      if (ACTIVE_PT === pt) renderActiveTab();
    }
  }
}
