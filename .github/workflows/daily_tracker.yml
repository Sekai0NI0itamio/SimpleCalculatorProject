name: Daily Modrinth Tracker

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-tracker]

permissions:
  contents: write

env:
  VERSION_CHUNKS: 250  # Max parallel version fetch workers (GitHub limit = 256)

jobs:
  # ──────────────────────────────────────────────────────────
  # PHASE 1: Discover — get total mod count, categories, and
  #           create a partition plan for project fetching.
  # ──────────────────────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      partition_count: ${{ steps.set_outputs.outputs.partition_count }}
      partition_list: ${{ steps.set_outputs.outputs.partition_list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Discover
        run: python src/discover.py
      - name: Set outputs
        id: set_outputs
        run: |
          echo "partition_count=$(python -c "import json; d=json.load(open('data/discovery.json')); print(len(d['partitions']))")" >> $GITHUB_OUTPUT
          echo "partition_list=$(python -c "import json; d=json.load(open('data/discovery.json')); print(json.dumps([p['index'] for p in d['partitions']]))")" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: discovery-data
          path: data/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # PHASE 2: Fetch Projects — each matrix job handles one
  #           category partition in parallel.
  # ──────────────────────────────────────────────────────────
  fetch-projects:
    needs: [discover]
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.discover.outputs.partition_list) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: discovery-data
          path: data/
      - name: Fetch projects chunk ${{ matrix.chunk }}
        run: python src/fetch_projects.py --chunk ${{ matrix.chunk }}
      - uses: actions/upload-artifact@v4
        with:
          name: projects-chunk-${{ matrix.chunk }}
          path: data/chunks/projects_${{ matrix.chunk }}.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # PHASE 3a: Split Versions — aggregate all project chunks
  #           and split into N version chunks for parallel
  #           version fetching.
  # ──────────────────────────────────────────────────────────
  split-versions:
    needs: [fetch-projects]
    runs-on: ubuntu-latest
    outputs:
      version_chunk_list: ${{ steps.set_version_chunks.outputs.version_chunk_list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          pattern: projects-chunk-*
          merge-multiple: true
          path: data/chunks/
      - name: Split projects into version chunks
        run: python src/fetch_versions.py --split ${{ env.VERSION_CHUNKS }}
      - name: Set version chunk outputs
        id: set_version_chunks
        run: |
          echo "version_chunk_list=$(python -c "import json; d=json.load(open('data/version_split.json')); print(json.dumps([c['index'] for c in d['chunks']]))")" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: version-split
          path: data/version_chunks/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # PHASE 3b: Fetch Versions — parallel matrix jobs, each
  #           fetching versions for a subset of projects.
  # ──────────────────────────────────────────────────────────
  fetch-versions:
    needs: [split-versions]
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.split-versions.outputs.version_chunk_list) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: version-split
          path: data/version_chunks/
      - name: Fetch versions chunk ${{ matrix.chunk }}
        run: python src/fetch_versions.py --chunk ${{ matrix.chunk }}
      - uses: actions/upload-artifact@v4
        with:
          name: version-results-${{ matrix.chunk }}
          path: data/version_results/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # PHASE 3c: Merge Versions — merge all version chunk results
  #           into the SQLite database.
  # ──────────────────────────────────────────────────────────
  merge-versions:
    needs: [fetch-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          pattern: version-results-*
          merge-multiple: true
          path: data/version_results/
      - name: Merge version chunks into database
        run: python src/fetch_versions.py --merge
      - uses: actions/upload-artifact@v4
        with:
          name: version-data
          path: data/version_summary.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # PHASE 4+5: Snapshot & Analyze — record daily download
  #            counts and generate category-based reports.
  # ──────────────────────────────────────────────────────────
  snapshot-and-analyze:
    needs: [merge-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: discovery-data
          path: data/
      - uses: actions/download-artifact@v4
        with:
          pattern: projects-chunk-*
          merge-multiple: true
          path: data/chunks/
      - uses: actions/download-artifact@v4
        with:
          name: version-data
          path: data/
      - name: Download existing database
        run: |
          gh run download --name modrinth-db --dir data/ --repo ${{ github.repository }} 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Snapshot
        run: python src/snapshot.py
      - name: Analyze
        run: python src/analyze.py
      - name: Market Analytics
        run: python src/analytics.py
      - name: Commit reports to repository
        run: |
          git config user.name "Modrinth Tracker Bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: auto-update tracker report $(date +%Y-%m-%d)"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git push
      - uses: actions/upload-artifact@v4
        with:
          name: modrinth-db
          path: data/modrinth_tracker.db
          retention-days: 90
      - uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: reports/
          retention-days: 90
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-data
          path: data/snapshot_date.txt
          retention-days: 1