name: Tracker (Reusable)

on:
  workflow_call:
    inputs:
      project_type:
        required: true
        type: string
      version_chunks:
        required: false
        type: number
        default: 20
      is_main:
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  PYTHONPATH: src

jobs:
  # ──────────────────────────────────────────────────────────────
  # PHASE 1: Discover — find partitions for this project type
  # (MAIN HOUR ONLY — sub hours reuse existing discovery.json)
  # ──────────────────────────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    if: ${{ inputs.is_main == true }}
    outputs:
      partition_list: ${{ steps.set-matrix.outputs.partition_list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Discover projects
        run: python src/discover.py --project-type ${{ inputs.project_type }}
      - id: set-matrix
        name: Generate partition matrix
        run: |
          python -c "
          import json
          d = json.load(open('data/${{ inputs.project_type }}/discovery.json'))
          print(json.dumps(list(range(len(d['partitions'])))))
          " > /tmp/matrix.txt
          echo "partition_list=$(cat /tmp/matrix.txt)" >> $GITHUB_OUTPUT
      - name: Upload discovery data
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-discovery
          path: |
            data/${{ inputs.project_type }}/discovery.json
            data/${{ inputs.project_type }}/categories.json
            data/${{ inputs.project_type }}/loaders.json

  # ──────────────────────────────────────────────────────────────
  # PHASE 1 (SUB HOUR): Load discovery from repo checkout
  # On sub hours, we need the discovery.json from the repo to know partitions
  # ──────────────────────────────────────────────────────────────
  load-discovery:
    runs-on: ubuntu-latest
    if: ${{ inputs.is_main != true }}
    outputs:
      partition_list: ${{ steps.set-matrix.outputs.partition_list }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        name: Read partition matrix from existing discovery.json
        run: |
          python -c "
          import json
          d = json.load(open('data/${{ inputs.project_type }}/discovery.json'))
          print(json.dumps(list(range(len(d['partitions'])))))
          " > /tmp/matrix.txt
          echo "partition_list=$(cat /tmp/matrix.txt)" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────
  # PHASE 2: Fetch Projects (parallel matrix)
  # ALWAYS run — both main and sub hours need current download counts
  # ──────────────────────────────────────────────────────────────
  fetch-projects:
    needs: [discover, load-discovery]
    if: ${{ always() && (needs.discover.result == 'success' || needs.load-discovery.result == 'success') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJSON(needs.discover.outputs.partition_list || needs.load-discovery.outputs.partition_list) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Download discovery data (main hour)
        if: ${{ inputs.is_main == true }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project_type }}-discovery
          path: data/${{ inputs.project_type }}/
      - name: Fetch projects
        run: python src/fetch_projects.py --project-type ${{ inputs.project_type }} --chunk ${{ matrix.chunk }}
      - name: Upload chunk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-projects-${{ matrix.chunk }}
          path: data/${{ inputs.project_type }}/chunks/projects_${{ matrix.chunk }}.json
          retention-days: 1  # Short retention for sub-hour runs

  # ──────────────────────────────────────────────────────────────
  # PHASE 3a: Split versions (MAIN HOUR ONLY)
  # ──────────────────────────────────────────────────────────────
  split-versions:
    needs: fetch-projects
    if: ${{ always() && inputs.is_main == true && needs.fetch-projects.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version_chunk_list: ${{ steps.set-matrix.outputs.version_chunk_list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Download all project chunks
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.project_type }}-projects-*
          path: data/${{ inputs.project_type }}/chunks/
          merge-multiple: true
      - name: Split versions
        run: python src/fetch_versions.py --project-type ${{ inputs.project_type }} --split ${{ inputs.version_chunks }}
      - id: set-matrix
        name: Generate version chunk matrix
        run: |
          python -c "
          import json
          d = json.load(open('data/${{ inputs.project_type }}/version_split.json'))
          print(json.dumps(list(range(d['num_chunks']))))
          " > /tmp/vmatrix.txt
          echo "version_chunk_list=$(cat /tmp/vmatrix.txt)" >> $GITHUB_OUTPUT
      - name: Upload version chunks
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-version-chunks
          path: data/${{ inputs.project_type }}/version_chunks/

  # ──────────────────────────────────────────────────────────────
  # PHASE 3b: Fetch versions (parallel matrix) — MAIN HOUR ONLY
  # ──────────────────────────────────────────────────────────────
  fetch-versions:
    needs: split-versions
    if: ${{ always() && inputs.is_main == true && needs.split-versions.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJSON(needs.split-versions.outputs.version_chunk_list) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Download version chunks
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project_type }}-version-chunks
          path: data/${{ inputs.project_type }}/version_chunks/
      - name: Fetch versions
        run: python src/fetch_versions.py --project-type ${{ inputs.project_type }} --chunk ${{ matrix.chunk }}
      - name: Upload version results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-version-results-${{ matrix.chunk }}
          path: data/${{ inputs.project_type }}/version_results/results_${{ matrix.chunk }}.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # PHASE 4+5: Merge, Snapshot, Analyze, Render Charts, Commit
  # MAIN HOUR: merge versions → snapshot → main analysis → main charts → commit
  # SUB HOUR:  snapshot → predictive analysis → sub charts → commit
  # ──────────────────────────────────────────────────────────────
  finalize:
    needs: [fetch-projects, fetch-versions]
    if: ${{ always() && needs.fetch-projects.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      # Download discovery data (for categories.json + loaders.json used by analyze)
      - name: Download discovery data (main hour)
        if: ${{ inputs.is_main == true }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project_type }}-discovery
          path: data/${{ inputs.project_type }}/

      # Download all project chunks
      - name: Download all project chunks
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.project_type }}-projects-*
          path: data/${{ inputs.project_type }}/chunks/
          merge-multiple: true

      # Download all version results (MAIN HOUR ONLY)
      - name: Download all version results
        if: ${{ inputs.is_main == true }}
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.project_type }}-version-results-*
          path: data/${{ inputs.project_type }}/version_results/
          merge-multiple: true

      # Download previous DB
      - name: Download previous DB
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project_type }}-db
          path: data/${{ inputs.project_type }}/
        continue-on-error: true

      # MAIN HOUR: Merge versions
      - name: Merge versions
        if: ${{ inputs.is_main == true }}
        run: python src/fetch_versions.py --project-type ${{ inputs.project_type }} --merge

      # ALWAYS: Snapshot
      - name: Snapshot
        run: python src/snapshot.py --project-type ${{ inputs.project_type }}

      # MAIN HOUR: Main analysis
      - name: Main analysis
        if: ${{ inputs.is_main == true }}
        run: python src/analyze.py --project-type ${{ inputs.project_type }}

      # MAIN HOUR: Render main charts
      - name: Render main charts
        if: ${{ inputs.is_main == true }}
        run: python src/render_charts.py --project-type ${{ inputs.project_type }} --mode main

      # SUB HOUR: Predictive analysis
      - name: Predictive analysis
        if: ${{ inputs.is_main != true }}
        run: python src/predictive_analyze.py --project-type ${{ inputs.project_type }}

      # SUB HOUR: Render sub charts
      - name: Render sub charts
        if: ${{ inputs.is_main != true }}
        run: python src/render_charts.py --project-type ${{ inputs.project_type }} --mode sub

      # Commit data files to git
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ "${{ inputs.is_main }}" = "true" ]; then
            git add data/${{ inputs.project_type }}/raw/ \
                   data/${{ inputs.project_type }}/analysis/ \
                   data/${{ inputs.project_type }}/latest_analysis.json \
                   data/${{ inputs.project_type }}/charts/ \
                   data/${{ inputs.project_type }}/discovery.json \
                   data/${{ inputs.project_type }}/categories.json \
                   data/${{ inputs.project_type }}/loaders.json \
                   2>/dev/null || true
            COMMIT_MSG="tracker: ${{ inputs.project_type }} main daily snapshot $(date -u +%Y-%m-%dT%H:%M)"
          else
            git add data/${{ inputs.project_type }}/raw/ \
                   data/${{ inputs.project_type }}/analysis/ \
                   data/${{ inputs.project_type }}/latest_sub_analysis.json \
                   data/${{ inputs.project_type }}/charts/ \
                   2>/dev/null || true
            COMMIT_MSG="tracker: ${{ inputs.project_type }} sub snapshot $(date -u +%Y-%m-%dT%H:%M)"
          fi
          
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            git push origin main && break
            echo "Push failed, retrying in 10s..."
            sleep 10
          done

      # Upload DB (main hour only — sub hours don't change versions)
      - name: Upload DB
        if: ${{ inputs.is_main == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-db
          path: data/${{ inputs.project_type }}/${{ inputs.project_type }}.db
          retention-days: 90
