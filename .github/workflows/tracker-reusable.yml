name: Tracker (Reusable)

on:
  workflow_call:
    inputs:
      project_type:
        required: true
        type: string
      version_chunks:
        required: false
        type: number
        default: 20
      analysis_mode:
        required: true
        type: string
        description: "daily or hourly"

permissions:
  contents: write

env:
  PYTHONPATH: src

jobs:
  # ──────────────────────────────────────────────────────────────
  # PHASE 1: Discover — find partitions (only if discovery.json is stale)
  # Runs faster on subsequent runs by reusing cached discovery.json
  # ──────────────────────────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      partition_list: ${{ steps.set-matrix.outputs.partition_list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Check if discovery.json exists
        id: check
        run: |
          if [ -f "data/${{ inputs.project_type }}/discovery.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Discover projects
        if: ${{ steps.check.outputs.exists == 'false' }}
        run: python src/discover.py --project-type ${{ inputs.project_type }}
      - id: set-matrix
        name: Read partition matrix
        run: |
          python -c "
          import json
          d = json.load(open('data/${{ inputs.project_type }}/discovery.json'))
          print(json.dumps(list(range(len(d['partitions'])))))
          " > /tmp/matrix.txt
          echo "partition_list=$(cat /tmp/matrix.txt)" >> $GITHUB_OUTPUT
      - name: Upload discovery data
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-discovery
          path: |
            data/${{ inputs.project_type }}/discovery.json
            data/${{ inputs.project_type }}/categories.json
            data/${{ inputs.project_type }}/loaders.json

  # ──────────────────────────────────────────────────────────────
  # PHASE 2: Fetch Projects (parallel matrix)
  # ALWAYS run — re-fetches current download counts every 2 hours
  # ──────────────────────────────────────────────────────────────
  fetch-projects:
    needs: discover
    if: ${{ always() && needs.discover.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJSON(needs.discover.outputs.partition_list) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Download discovery data
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project_type }}-discovery
          path: data/${{ inputs.project_type }}/
      - name: Fetch projects
        run: python src/fetch_projects.py --project-type ${{ inputs.project_type }} --chunk ${{ matrix.chunk }}
      - name: Upload chunk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-projects-${{ matrix.chunk }}
          path: data/${{ inputs.project_type }}/chunks/projects_${{ matrix.chunk }}.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # PHASE 3a: Split versions (ALWAYS — every 2 hours)
  # ──────────────────────────────────────────────────────────────
  split-versions:
    needs: fetch-projects
    if: ${{ always() && needs.fetch-projects.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version_chunk_list: ${{ steps.set-matrix.outputs.version_chunk_list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Download all project chunks
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.project_type }}-projects-*
          path: data/${{ inputs.project_type }}/chunks/
          merge-multiple: true
      - name: Split versions
        run: python src/fetch_versions.py --project-type ${{ inputs.project_type }} --split ${{ inputs.version_chunks }}
      - id: set-matrix
        name: Generate version chunk matrix
        run: |
          python -c "
          import json
          d = json.load(open('data/${{ inputs.project_type }}/version_split.json'))
          n = d['num_chunks']
          # Empty matrix when n=0 — fetch-versions job is skipped, finalize still runs
          print(json.dumps(list(range(n))))
          " > /tmp/vmatrix.txt
          echo "version_chunk_list=$(cat /tmp/vmatrix.txt)" >> $GITHUB_OUTPUT
      - name: Upload version chunks
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-version-chunks
          path: data/${{ inputs.project_type }}/version_chunks/

  # ──────────────────────────────────────────────────────────────
  # PHASE 3b: Fetch versions (parallel matrix) — ALWAYS
  # ──────────────────────────────────────────────────────────────
  fetch-versions:
    needs: split-versions
    if: ${{ always() && needs.split-versions.result == 'success' && needs.split-versions.outputs.version_chunk_list != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJSON(needs.split-versions.outputs.version_chunk_list) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Download version chunks
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project_type }}-version-chunks
          path: data/${{ inputs.project_type }}/version_chunks/
      - name: Fetch versions
        run: python src/fetch_versions.py --project-type ${{ inputs.project_type }} --chunk ${{ matrix.chunk }}
      - name: Upload version results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_type }}-version-results-${{ matrix.chunk }}
          path: data/${{ inputs.project_type }}/version_results/results_${{ matrix.chunk }}.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # PHASE 4+5: Merge, Snapshot, Analyze, Render Charts, Commit
  # ALWAYS runs full pipeline.
  # analysis_mode determines which baseline is used:
  #   daily  → 24h comparison (runs at 00:00 UTC / 08:00 Beijing)
  #   hourly → 2h comparison (runs every 2 hours)
  # ──────────────────────────────────────────────────────────────
  finalize:
    needs: [fetch-projects, fetch-versions]
    if: ${{ always() && needs.fetch-projects.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      # Download discovery data
      - name: Download discovery data
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project_type }}-discovery
          path: data/${{ inputs.project_type }}/

      # Download all project chunks
      - name: Download all project chunks
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.project_type }}-projects-*
          path: data/${{ inputs.project_type }}/chunks/
          merge-multiple: true

      # Download all version results
      - name: Download all version results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: ${{ inputs.project_type }}-version-results-*
          path: data/${{ inputs.project_type }}/version_results/
          merge-multiple: true

      # Merge versions
      - name: Merge versions
        run: python src/fetch_versions.py --project-type ${{ inputs.project_type }} --merge

      # Snapshot (saves as .json.gz)
      - name: Snapshot
        run: python src/snapshot.py --project-type ${{ inputs.project_type }}

      # Analyze (daily or hourly mode)
      - name: Analyze (${{ inputs.analysis_mode }})
        run: python src/analyze.py --project-type ${{ inputs.project_type }} --mode ${{ inputs.analysis_mode }}

      # Predictive analysis (velocity, acceleration, predictions, anomalies)
      # Runs AFTER analyze.py so it can use the latest snapshot.
      # Skip on first run (needs ≥4 snapshots for velocity/acceleration).
      - name: Predictive analysis
        continue-on-error: true
        run: python src/predictive_analyze.py --project-type ${{ inputs.project_type }}

      # Render PNG charts (trend, categories, loaders, velocity, prediction, etc.)
      # Depends on latest_analysis.json + latest_sub_analysis.json being present.
      - name: Render charts (${{ inputs.analysis_mode }})
        continue-on-error: true
        run: python src/render_charts.py --project-type ${{ inputs.project_type }} --mode ${{ inputs.analysis_mode }}

      # Commit data files to git
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add the entire project directory; .gitignore already excludes
          # chunks/, version_chunks/, version_results/, version_split.json,
          # versions_merged.json(.gz), *.db* — so only data files are staged.
          # Using the directory avoids "pathspec did not match" failures when
          # analyze.py skips (first run, needs 2 snapshots) and analysis/
          # latest_analysis.json don't exist yet.
          git add data/${{ inputs.project_type }}/ || true

          COMMIT_MSG="tracker: ${{ inputs.project_type }} ${{ inputs.analysis_mode }} snapshot $(date -u +%Y-%m-%dT%H:%M)"
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            git push origin main && break
            echo "Push failed, retrying in 10s..."
            sleep 10
          done