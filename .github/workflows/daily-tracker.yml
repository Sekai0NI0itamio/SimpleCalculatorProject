name: Daily Modrinth Tracker

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours at :00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  # Determine analysis mode from UTC hour
  # 00:00 UTC = 08:00 Beijing → daily (24h comparison)
  # Other hours → hourly (2h comparison)
  check-mode:
    runs-on: ubuntu-latest
    outputs:
      analysis_mode: ${{ steps.check.outputs.mode }}
    steps:
      - id: check
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "00" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          else
            echo "mode=hourly" >> $GITHUB_OUTPUT
          fi

  # All 6 project types run in parallel every 2 hours.
  # Every run does the FULL pipeline (discover → fetch-projects → split-versions →
  # fetch-versions → merge → snapshot → analyze → render charts → commit).
  #
  # Analysis mode:
  #   daily  (00:00 UTC / 08:00 Beijing) — 24h day-over-day comparison
  #   hourly (every other even hour) — 2h delta with velocity predictions

  mod:
    needs: check-mode
    uses: ./.github/workflows/tracker-reusable.yml
    with:
      project_type: mod
      version_chunks: 30
      analysis_mode: ${{ needs.check-mode.outputs.analysis_mode }}

  modpack:
    needs: check-mode
    uses: ./.github/workflows/tracker-reusable.yml
    with:
      project_type: modpack
      version_chunks: 10
      analysis_mode: ${{ needs.check-mode.outputs.analysis_mode }}

  resourcepack:
    needs: check-mode
    uses: ./.github/workflows/tracker-reusable.yml
    with:
      project_type: resourcepack
      version_chunks: 10
      analysis_mode: ${{ needs.check-mode.outputs.analysis_mode }}

  shader:
    needs: check-mode
    uses: ./.github/workflows/tracker-reusable.yml
    with:
      project_type: shader
      version_chunks: 5
      analysis_mode: ${{ needs.check-mode.outputs.analysis_mode }}

  datapack:
    needs: check-mode
    uses: ./.github/workflows/tracker-reusable.yml
    with:
      project_type: datapack
      version_chunks: 10
      analysis_mode: ${{ needs.check-mode.outputs.analysis_mode }}

  world:
    needs: check-mode
    uses: ./.github/workflows/tracker-reusable.yml
    with:
      project_type: world
      version_chunks: 5
      analysis_mode: ${{ needs.check-mode.outputs.analysis_mode }}

  # Generate combined website report after all project types are done
  generate-report:
    needs: [mod, modpack, resourcepack, shader, datapack, world]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Generate combined report
        run: python src/generate_report.py
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "Update combined website report"
          git push